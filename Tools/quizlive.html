<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizLive — 即時互動問答</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1f2937;--surface:#1e293b;--border:#334155;
  --primary:#6366f1;--primary-d:#4f46e5;--primary-l:#818cf8;
  --text:#f1f5f9;--text-m:#94a3b8;--text-d:#64748b;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;--cyan:#06b6d4;
  --c0:#e21b3c;--c1:#1368ce;--c2:#d89e00;--c3:#26890c;--c4:#864cbf;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.animate-in{animation:fadeIn .3s ease both}.animate-pop{animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
.confetti-piece{position:fixed;top:-20px;animation:confetti-fall 2.5s ease-in forwards;pointer-events:none;z-index:9999;border-radius:2px}
.app-shell{display:flex;min-height:100vh}
/* SIDEBAR */
.sidebar{width:240px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:24px 20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),#a855f7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.logo-text{font-family:'Fredoka One',cursive;font-size:20px;background:linear-gradient(135deg,var(--primary-l),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-nav{padding:12px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s,color .15s;color:var(--text-m);font-weight:600;font-size:14px;margin-bottom:2px;user-select:none}
.nav-item:hover{background:var(--bg3);color:var(--text)}.nav-item.active{background:var(--primary);color:#fff}
.nav-item .nav-icon{font-size:18px;width:22px;text-align:center}
.sidebar-footer{padding:12px 10px;border-top:1px solid var(--border)}
.sidebar-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,.15);color:var(--primary-l);border:1px solid rgba(99,102,241,.3);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow:auto}
.page-header{padding:24px 32px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.page-title{font-family:'Fredoka One',cursive;font-size:24px;color:var(--text);margin-bottom:4px}
.page-sub{color:var(--text-m);font-size:13px}
.page-content{padding:28px 32px;flex:1}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-weight:800;font-size:15px;color:var(--text)}
/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;transition:all .15s;user-select:none}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover:not(:disabled){background:var(--primary-d);transform:translateY(-1px)}
.btn-success{background:#16a34a;color:#fff}.btn-success:hover:not(:disabled){background:#15803d;transform:translateY(-1px)}
.btn-danger{background:#dc2626;color:#fff}.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:transparent;color:var(--text-m);border:1px solid var(--border)}.btn-ghost:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.btn-lg{padding:12px 24px;font-size:15px;border-radius:10px}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px}
/* FORM */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-control{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;padding:9px 12px;transition:border .15s;outline:none}
.form-control:focus{border-color:var(--primary)}.form-control::placeholder{color:var(--text-d)}
select.form-control{cursor:pointer}textarea.form-control{resize:vertical;min-height:80px}
/* TAG */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.tag-single{background:rgba(6,182,212,.15);color:#22d3ee}.tag-multi{background:rgba(168,85,247,.15);color:#c084fc}.tag-survey{background:rgba(251,191,36,.15);color:#fbbf24}
/* Q-CARD */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;transition:border .15s;position:relative}
.q-card:hover{border-color:var(--primary)}
.q-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.q-num{width:28px;height:28px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--text-m);flex-shrink:0}
.q-text{font-weight:700;font-size:14px;color:var(--text);flex:1;line-height:1.5}
.q-options{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:6px;margin-top:10px}
.q-option{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:13px}
.q-option.correct{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}.q-option.wrong{background:var(--bg3);color:var(--text-m);border:1px solid transparent}
.opt-letter{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:fadeIn .2s ease}
.modal-title{font-family:'Fredoka One',cursive;font-size:22px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}
/* OPT EDITOR */
.opt-editor{display:flex;align-items:center;gap:8px;margin-bottom:8px}.opt-editor input{flex:1}
.opt-checkbox{width:20px;height:20px;cursor:pointer;accent-color:var(--primary);flex-shrink:0}
/* LIVE */
.live-bar{background:linear-gradient(135deg,#4f46e5,#7c3aed,#9333ea);padding:12px 32px;display:flex;align-items:center;justify-content:space-between}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;text-transform:uppercase}
.live-dot{width:8px;height:8px;background:#f87171;border-radius:50%;animation:pulse 1s infinite}
.session-code{font-family:'Fredoka One',cursive;font-size:28px;letter-spacing:4px;color:#fff}
.q-stage{background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);border-radius:16px;padding:32px;margin-bottom:20px;text-align:center;position:relative;border:1px solid var(--border)}
.q-stage-num{font-size:12px;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.q-stage-text{font-family:'Fredoka One',cursive;font-size:28px;line-height:1.3;color:var(--text);margin-bottom:24px}
/* ANSWER BTNS */
.answer-grid{display:grid;gap:12px}
.answer-grid.cols-2{grid-template-columns:1fr 1fr}.answer-grid.cols-3{grid-template-columns:1fr 1fr 1fr}.answer-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}.answer-grid.cols-5{grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.answer-btn{display:flex;align-items:center;gap:10px;padding:14px 18px;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;color:#fff;transition:all .15s;text-align:left;position:relative;overflow:hidden}
.answer-btn:hover:not(:disabled){filter:brightness(1.1)}.answer-btn:active:not(:disabled){transform:scale(.97)}.answer-btn:disabled{cursor:default}
.answer-btn.c0{background:var(--c0)}.answer-btn.c1{background:var(--c1)}.answer-btn.c2{background:var(--c2)}.answer-btn.c3{background:var(--c3)}.answer-btn.c4{background:var(--c4)}
.answer-btn.revealed.correct{box-shadow:0 0 0 3px #4ade80,0 4px 20px rgba(34,197,94,.4);transform:scale(1.02)}
.answer-btn.revealed.wrong{opacity:.5;filter:grayscale(.5)}
.answer-btn.selected{box-shadow:0 0 0 3px #fff}
.opt-shape{width:30px;height:30px;background:rgba(0,0,0,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.check-indicator{width:20px;height:20px;border:2px solid rgba(255,255,255,.5);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(0,0,0,.2)}
.answer-btn.selected .check-indicator{background:rgba(255,255,255,.25);border-color:#fff}
/* STATS */
.stat-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;text-align:center;min-width:80px}
.stat-val{font-family:'Fredoka One',cursive;font-size:24px;color:var(--text)}
.stat-label{font-size:11px;color:var(--text-m);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
/* RESP BARS */
.resp-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.resp-bar-track{flex:1;background:var(--bg3);border-radius:6px;height:28px;position:relative;overflow:hidden}
.resp-bar-fill{height:100%;border-radius:6px;transition:width .4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:12px;font-weight:800;color:rgba(255,255,255,.9);min-width:32px}
/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;margin-bottom:8px;background:var(--bg3);transition:all .2s}
.lb-item.rank-1{background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.08));border:1px solid rgba(251,191,36,.3)}
.lb-item.rank-2{background:linear-gradient(135deg,rgba(148,163,184,.1),rgba(100,116,139,.05));border:1px solid rgba(148,163,184,.2)}
.lb-item.rank-3{background:linear-gradient(135deg,rgba(180,83,9,.15),rgba(161,83,0,.08));border:1px solid rgba(180,83,9,.3)}
.lb-rank{font-family:'Fredoka One',cursive;font-size:18px;width:28px;text-align:center;flex-shrink:0}
.lb-name{font-weight:700;font-size:14px;flex:1}.lb-points{font-family:'Fredoka One',cursive;font-size:18px;color:var(--primary-l)}
/* STUDENT */
.student-app{min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.student-header{padding:16px 20px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.student-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;max-width:700px;margin:0 auto;width:100%}
.join-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;text-align:center}
.join-logo{font-family:'Fredoka One',cursive;font-size:42px;background:linear-gradient(135deg,var(--primary-l),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.join-sub{color:var(--text-m);font-size:14px;margin-bottom:28px}
.answered-screen{text-align:center;animation:fadeIn .3s ease}
.answered-icon{font-size:72px;margin-bottom:16px;animation:pop .4s ease}
.result-correct{font-family:'Fredoka One',cursive;font-size:32px;color:var(--green);margin-bottom:8px}
.result-wrong{font-family:'Fredoka One',cursive;font-size:32px;color:var(--red);margin-bottom:8px}
.result-sub{color:var(--text-m);font-size:15px}
/* HISTORY */
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;cursor:pointer;transition:border .15s}
.history-card:hover{border-color:var(--primary)}
.history-card.selected{border-color:var(--primary);background:rgba(99,102,241,.08)}
/* QR */
.qr-wrapper{background:#fff;border-radius:12px;padding:12px;display:inline-flex;align-items:center;justify-content:center}
/* HELPERS */
.progress-bar-wrap{width:100%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:20px}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#a855f7);border-radius:3px;transition:width .4s ease}
.q-type-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:4px;margin-left:8px}
.qtb-single{background:rgba(6,182,212,.15);color:#22d3ee}.qtb-multi{background:rgba(168,85,247,.15);color:#c084fc}.qtb-survey{background:rgba(251,191,36,.15);color:#fbbf24}
.ctrl-panel{background:var(--bg2);border-top:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.empty{text-align:center;padding:48px 20px;color:var(--text-m)}.empty-icon{font-size:48px;margin-bottom:12px}
.check-q-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:4px}
.check-q-item:hover{background:var(--bg3)}.check-q-item input[type=checkbox]{accent-color:var(--primary);width:16px;height:16px}
.session-q-list{max-height:280px;overflow-y:auto}
/* FIREBASE SETUP */
.setup-card{background:var(--surface);border:2px dashed var(--border);border-radius:16px;padding:32px;max-width:560px;margin:0 auto;text-align:center}
.setup-step{background:var(--bg3);border-radius:10px;padding:14px 18px;margin-bottom:10px;text-align:left;font-size:13px;line-height:1.7}
.setup-step code{background:rgba(99,102,241,.2);color:var(--primary-l);padding:2px 6px;border-radius:4px;font-size:12px}
.multi-hint{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.3);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;color:#c084fc;text-align:center;margin-bottom:16px}
@media(max-width:768px){.sidebar{display:none}.page-content{padding:16px}.page-header{padding:16px}.answer-grid.cols-3,.answer-grid.cols-4,.answer-grid.cols-5{grid-template-columns:1fr 1fr}.q-stage-text{font-size:20px}}
</style>
</head>

<div id="app"></div>

    s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function initFirebase(cfg){
  try{
    if(!cfg||!cfg.databaseURL)return{ok:false,msg:'缺少 databaseURL，請確認 Firebase 設定包含 databaseURL 欄位'};
    // Firebase already inlined
    // Reuse existing app if config matches, else create new
    let app;
    if(window.firebase&&firebase.apps&&firebase.apps.length){
      // Check if same project
      const existing=firebase.apps[0];
      if(existing.options.databaseURL===cfg.databaseURL){
        app=existing;
      } else {
        await Promise.all(firebase.apps.map(a=>a.delete().catch(()=>{})));
        app=firebase.initializeApp(cfg);
      }
    } else {
      app=firebase.initializeApp(cfg);
    }
    _fbDb=firebase.database(app);
    // Test write permission with timeout
    await Promise.race([
      _fbDb.ref('.info/serverTimeOffset').once('value'),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('連線逾時，請檢查 databaseURL 是否正確')),8000))
    ]);
    _fbReady=true;
    db.set('fbConfig',cfg);
    return{ok:true};
  }catch(e){
    _fbReady=false;
    _fbDb=null;
    return{ok:false,msg:e.message||String(e)};
  }
}

const FB={
  ref(path){return _fbDb?_fbDb.ref(path):null;},
  async set(path,val){
    if(!_fbDb)throw new Error('Firebase DB 未初始化（_fbDb=null）');
    await _fbDb.ref(path).set(val);
  },
  async update(path,val){const r=this.ref(path);if(r)await r.update(val);},
  async remove(path){const r=this.ref(path);if(r)await r.remove();},
  async push(path,val){const r=this.ref(path);if(!r)return null;const k=await r.push(val);return k.key;},
  on(path,event,cb){
    const r=this.ref(path);if(!r)return()=>{};
    const fn=snap=>cb(snap.val(),snap.key);
    r.on(event,fn);
    return()=>r.off(event,fn);
  },
  once(path){
    const r=this.ref(path);if(!r)return Promise.resolve(null);
    return r.once('value').then(s=>s.val());
  },
};

/* ── CONFETTI ── */
function launchConfetti(count=60){
  const cols=['#6366f1','#f59e0b','#22c55e','#ef4444','#8b5cf6','#06b6d4','#f43f5e'];
  for(let i=0;i<count;i++){

    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}%;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()}s;animation-duration:${2+Math.random()*1.5}s;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

/* ════════════════════════════════
   TEACHER APP
════════════════════════════════ */
const TeacherApp={
  setup(){
    const page=ref('questions');
    const questions=ref(db.get('questions',[]));
    const sessions=ref(db.get('sessions',[]));
    const savedCfg=FIREBASE_CONFIG_BAKED||db.get('fbConfig');
    const fbConfigStr=ref(savedCfg&&savedCfg.databaseURL?JSON.stringify(savedCfg,null,2):'');
    const fbStatus=ref(_fbReady?'connected':'disconnected'); // disconnected|connecting|connected|error
    const fbError=ref('');
    const showFbModal=ref(false);

    // Try auto-connect if config saved
    onMounted(async()=>{
      const savedCfgForMount=FIREBASE_CONFIG_BAKED||db.get('fbConfig');
      if(savedCfgForMount&&savedCfgForMount.databaseURL){
        fbStatus.value='connecting';
        const r=await initFirebase(savedCfgForMount);
        fbStatus.value=r.ok?'connected':'error';
        if(!r.ok)fbError.value=r.msg;
      }
      if(_fbReady){
        // Load questions from Firebase
        await loadQuestionsFromFirebase();
        // Load history from Firebase
        await loadHistoryFromFirebase();
        // Check for active session
        const activeId=db.get('activeSessionId');
        if(activeId){
          const s=await FB.once('sessions/'+activeId);
          if(s&&s.status!=='finished'){
            liveSession.value=s;
            subscribeSession(activeId);
            page.value='session';
          }
        }
      }
    });

    async function loadQuestionsFromFirebase(){
      try{
        const data=await FB.once('questionBank');
        if(!data)return;
        const arr=Object.values(data).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
        questions.value=arr;
        db.set('questions',arr);
      }catch(e){console.warn('載入題庫失敗:',e.message);}
    }

    async function loadHistoryFromFirebase(){
      try{
        const data=await FB.once('history');
        // If Firebase returns null/empty, clear local too (e.g. after delete from another device)
        if(!data){
          sessions.value=[];
          db.set('sessions',[]);
          return;
        }
        const arr=Object.values(data).sort((a,b)=>(b.endedAt||0)-(a.endedAt||0));
        sessions.value=arr;
        db.set('sessions',arr);
      }catch(e){console.warn('載入歷史紀錄失敗:',e.message);}
    }

    function copyConfigSnippet(){
      const cfg=db.get('fbConfig');
      if(!cfg||!cfg.databaseURL){fbError.value='請先成功連線 Firebase 後再複製';return;}
      const snippet='const FIREBASE_CONFIG_BAKED = '+JSON.stringify(cfg)+';';
      navigator.clipboard.writeText(snippet).then(()=>{
        copyDone.value=true;setTimeout(()=>copyDone.value=false,3000);
      }).catch(()=>{
        // fallback: show in textarea
        fbConfigSnippet.value=snippet;
      });
    }
    const copyDone=ref(false);
    const fbConfigSnippet=ref('');

    async function connectFirebase(){
      fbError.value='';
      let raw=fbConfigStr.value.trim();
      // Auto-fix: Firebase console gives JS object, not JSON
      // e.g. { apiKey: "xxx" } -> { "apiKey": "xxx" }
      // Also strip: const firebaseConfig = { ... };
      raw=raw.replace(/^const\s+\w+\s*=\s*/,'').replace(/;\s*$/,'').trim();
      // Quote unquoted keys: word: -> "word":
      raw=raw.replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)(\s*:)/g,'$1"$2"$3');
      let cfg;
      try{cfg=JSON.parse(raw);}
      catch(e){fbError.value='格式錯誤：'+e.message+'\n請直接從 Firebase 主控台複製 firebaseConfig 物件貼入';return;}
      if(!cfg.databaseURL){
        fbError.value='找不到 databaseURL！\n請確認 Firebase 專案已啟用 Realtime Database，並在設定中包含 databaseURL（格式：https://xxx-default-rtdb.firebaseio.com）';
        return;
      }
      fbStatus.value='connecting';
      const r=await initFirebase(cfg);
      if(r.ok){
        fbStatus.value='connected';
        fbConfigStr.value=JSON.stringify(cfg,null,2);
        await loadQuestionsFromFirebase();
        await loadHistoryFromFirebase();
      } else {
        fbStatus.value='error';
        fbError.value=r.msg;
      }
    }

    /* ── Question CRUD ── */
    const showDeleteConfirm=ref(false);
    const pendingDeleteId=ref(null);
    const showQModal=ref(false);
    const editQ=ref(null);
    const qForm=ref({text:'',type:'single',options:['',''],correct:[],minCorrect:1});
    const qFormError=ref('');

    function saveQuestions(){
      db.set('questions',questions.value);
      if(_fbReady){
        // Convert array to object keyed by id for Firebase
        const obj={};
        questions.value.forEach(q=>{obj[q.id]=q;});
        FB.set('questionBank', obj).catch(e=>console.warn('題庫儲存失敗:',e.message));
      }
    }
    function saveSessions(){db.set('sessions',sessions.value);}

    function openNewQ(){
      editQ.value=null;
      qForm.value={text:'',type:'single',options:['',''],correct:[],minCorrect:1};
      qFormError.value='';showQModal.value=true;
    }
    function openEditQ(q){
      editQ.value=q.id;
      const opts=Array.isArray(q.options)?q.options:Object.values(q.options||{});
      const corr=Array.isArray(q.correct)?q.correct:Object.values(q.correct||{});
      qForm.value=clone({text:q.text,type:q.type,options:opts.slice(),correct:corr.slice(),minCorrect:q.minCorrect||1});
      qFormError.value='';showQModal.value=true;
    }
    function deleteQ(id){pendingDeleteId.value=id;showDeleteConfirm.value=true;}
    function confirmDelete(){
      questions.value=questions.value.filter(q=>q.id!==pendingDeleteId.value);
      saveQuestions();showDeleteConfirm.value=false;pendingDeleteId.value=null;
    }
    function cancelDelete(){showDeleteConfirm.value=false;pendingDeleteId.value=null;}

    function setType(t){qForm.value.type=t;qForm.value.correct=[];}
    function addOption(){if(qForm.value.options.length<5)qForm.value.options.push('');}
    function removeOption(i){
      if(qForm.value.options.length<=2)return;
      qForm.value.options.splice(i,1);
      qForm.value.correct=qForm.value.correct.filter(c=>c!==i).map(c=>c>i?c-1:c);
    }
    function toggleCorrect(i,event){
      const form=qForm.value;
      const checked=event?event.target.checked:!form.correct.includes(i);
      if(form.type==='single'){form.correct=checked?[i]:[];}
      else{
        if(checked){if(!form.correct.includes(i))form.correct.push(i);}
        else{const idx=form.correct.indexOf(i);if(idx!==-1)form.correct.splice(idx,1);}
      }
    }
    function saveQ(){
      const form=qForm.value;
      qFormError.value='';
      if(!form.text.trim()){qFormError.value='⚠️ 請輸入題目內容！';return;}
      if(form.options.some(o=>!o.trim())){qFormError.value='⚠️ 所有選項皆需填寫！';return;}
      const qObj={
        id:editQ.value||uid(),
        text:form.text.trim(),type:form.type,
        options:form.options.map(o=>o.trim()),
        correct:(Array.isArray(form.correct)?form.correct:Object.values(form.correct||{})).slice().sort(),
        minCorrect:form.type==='multiple'?(form.minCorrect||1):1,
        createdAt:now(),
      };
      if(editQ.value){
        const idx=questions.value.findIndex(q=>q.id===editQ.value);
        if(idx!==-1)questions.value.splice(idx,1,qObj);
        else questions.value.push(qObj);
      }else{questions.value.push(qObj);}
      saveQuestions();showQModal.value=false;
    }

    /* ── Session setup ── */
    const showSModal=ref(false);
    const sForm=ref({name:'',selectedQIds:[],timeLimit:20});
    function openNewSession(){
      sForm.value={name:'課堂 '+fmt(now()).split(' ')[0],selectedQIds:[],timeLimit:20};
      showSModal.value=true;
    }
    function toggleSelectQ(id){
      const arr=sForm.value.selectedQIds;
      const i=arr.indexOf(id);if(i===-1)arr.push(id);else arr.splice(i,1);
    }

    /* ── Live session ── */
    const liveSession=ref(null);
    const liveResponses=ref([]);
    const participants=ref({});   // { studentId: studentName }
    const timer=ref(0);
    const timerMax=ref(20);
    let timerInterval=null;
    let _unsubs=[];

    function subscribeSession(sessionId){
      unsubscribeSession();
      _unsubs.push(FB.on('sessions/'+sessionId,'value',val=>{
        if(!val)return;
        liveSession.value={...liveSession.value,...val};
        if(val.timer!==undefined)timer.value=val.timer;
      }));
      _unsubs.push(FB.on('participants/'+sessionId,'value',val=>{
        participants.value=val||{};
      }));
      _unsubs.push(FB.on('responses/'+sessionId,'value',val=>{
        if(!val){liveResponses.value=[];return;}
        const arr=[];
        Object.values(val).forEach(byQ=>{
          if(typeof byQ==='object')Object.values(byQ).forEach(r=>arr.push(r));
        });
        liveResponses.value=arr;
      }));
    }
    function unsubscribeSession(){_unsubs.forEach(u=>u());_unsubs=[];}

    async function startSession(){
      if(!_fbReady){showFbModal.value=true;return;}
      if(!sForm.value.name.trim()||sForm.value.selectedQIds.length===0)return;
      const id=codeGen();
      const s={
        id,name:sForm.value.name.trim(),
        questionIds:sForm.value.selectedQIds.slice(),
        timeLimit:parseInt(sForm.value.timeLimit)||20,
        status:'waiting',currentIndex:-1,
        startedAt:now(),timer:0,
      };
      liveSession.value=s;
      liveResponses.value=[];
      participants.value={};
      // Write selected questions to Firebase so students can access them
      const selectedQs = {};
      sForm.value.selectedQIds.forEach(qid => {
        const q = questions.value.find(qq => qq.id === qid);
        if(q) selectedQs[qid] = q;
      });
      await FB.set('sessions/'+id, s);
      await FB.set('questions/'+id, selectedQs);
      await FB.remove('participants/'+id);
      await FB.remove('responses/'+id);
      db.set('activeSessionId',id);
      subscribeSession(id);
      showSModal.value=false;
      page.value='session';
    }

    function startTimer(){
      clearInterval(timerInterval);
      const s=liveSession.value;if(!s)return;
      timer.value=timerMax.value;
      timerInterval=setInterval(async()=>{
        timer.value=Math.max(0,timer.value-1);
        await FB.update('sessions/'+s.id,{timer:timer.value});
        if(timer.value<=0){
          clearInterval(timerInterval);
          if(liveSession.value?.status==='question')revealAnswer();
        }
      },1000);
    }
    function stopTimer(){clearInterval(timerInterval);}

    async function nextQuestion(){
      const s=liveSession.value;if(!s)return;
      const nextIdx=s.currentIndex+1;
      if(nextIdx>=s.questionIds.length){endSession();return;}
      timerMax.value=s.timeLimit;
      await FB.update('sessions/'+s.id,{status:'question',currentIndex:nextIdx,timer:s.timeLimit});
      startTimer();
    }

    async function revealAnswer(){
      stopTimer();
      const s=liveSession.value;if(!s)return;
      await FB.update('sessions/'+s.id,{status:'reveal'});
    }

    async function endSession(){
      stopTimer();
      const s=liveSession.value;if(!s)return;
      await FB.update('sessions/'+s.id,{status:'finished'});
      // Clean up questions after session ends (optional, keep for now)
      // Save history
      const pArr=Object.entries(participants.value).map(([id,name])=>({id,name}));
      // Build question lookup for history
      const sessionQs=s.questionIds.map(qid=>questions.value.find(q=>q.id===qid)).filter(Boolean);
      const record={
        id:s.id, name:s.name,
        questionIds:s.questionIds.slice(),
        timeLimit:s.timeLimit,
        startedAt:s.startedAt,
        status:'finished', endedAt:now(),
        responses:clone(liveResponses.value),
        participants:pArr,
        questions:clone(sessionQs),
      };
      sessions.value.unshift(record);saveSessions();
      // Also save to Firebase for persistence across devices
      if(_fbReady){
        FB.set('history/'+record.id, record).catch(e=>console.warn('歷史儲存失敗:',e.message));
      }
      unsubscribeSession();
      liveSession.value=null;liveResponses.value=[];participants.value={};
      db.set('activeSessionId',null);
      page.value='history';
    }

    /* ── Computed ── */
    const liveQ=computed(()=>{
      const s=liveSession.value;if(!s||s.currentIndex<0)return null;
      const qid=s.questionIds[s.currentIndex];
      return questions.value.find(q=>q.id===qid)||null;
    });
    const liveResponsesToQ=computed(()=>{
      const q=liveQ.value;const s=liveSession.value;if(!q||!s)return[];
      return liveResponses.value.filter(r=>r.questionId===q.id&&r.sessionId===s.id);
    });
    const optionCounts=computed(()=>{
      const q=liveQ.value;if(!q)return[];
      return q.options.map((_,i)=>liveResponsesToQ.value.filter(r=>r.selected&&r.selected.includes(i)).length);
    });
    const totalAnswered=computed(()=>liveResponsesToQ.value.length);
    const participantList=computed(()=>Object.entries(participants.value).map(([id,name])=>({id,name})));
    const leaderboard=computed(()=>{
      const scores={};
      participantList.value.forEach(p=>{scores[p.id]={name:p.name,pts:0};});
      liveResponses.value.forEach(r=>{
        if(!scores[r.studentId])scores[r.studentId]={name:r.studentName,pts:0};
        if(r.points&&r.points>0)scores[r.studentId].pts+=r.points;
      });
      return Object.values(scores).sort((a,b)=>b.pts-a.pts).slice(0,10);
    });
    const progressPct=computed(()=>{
      const s=liveSession.value;if(!s||!s.questionIds.length)return 0;
      return Math.round((Math.max(0,s.currentIndex)/s.questionIds.length)*100);
    });
    const timerPct=computed(()=>timerMax.value>0?timer.value/timerMax.value*100:0);

    // QR URL
    function detectBaseUrl(){
      const h=window.location.href;
      if(h.startsWith('about:')||h.startsWith('blob:'))return db.get('baseUrl','');
      return h.split('?')[0];
    }
    const baseUrl=ref(db.get('baseUrl',detectBaseUrl()));
    const showBaseUrlEdit=ref(false);
    watch(baseUrl,v=>db.set('baseUrl',v));
    const qrUrl=computed(()=>{
      const s=liveSession.value;if(!s)return'';
      const base=(baseUrl.value||'').trim().replace(/\/$/,'');
      if(!base)return'（請先設定部署網址）?mode=student&session='+s.id;
      return base+'?mode=student&session='+s.id;
    });
    const qrIsValid=computed(()=>qrUrl.value.startsWith('http')||qrUrl.value.startsWith('https'));

    // History
    const showDetails=ref(null);
    const selectedSessions=ref([]);
    function openHistory(s){showDetails.value=s;}
    function toggleHistorySelect(id){
      const i=selectedSessions.value.indexOf(id);
      if(i>=0) selectedSessions.value.splice(i,1);
      else selectedSessions.value.push(id);
    }
    function historyQuestions(s){
      // For each question, build option counts
      const qs = (s.questions||[]);
      const qIds = s.questionIds||[];
      return qIds.map(qid=>{
        const q = (Array.isArray(qs)?qs:Object.values(qs||{})).find(qq=>qq&&qq.id===qid)||null;
        if(!q) return null;
        const responses = (s.responses||[]).filter(r=>r.questionId===qid);
        const correctArr = Array.isArray(q.correct)?q.correct:Object.values(q.correct||{});
        const counts = (q.options||[]).map((_,i)=>responses.filter(r=>{
          const sel=Array.isArray(r.selected)?r.selected:Object.values(r.selected||{});
          return (Array.isArray(sel)?sel:Object.values(sel||{})).includes(i);
        }).length);
        const total = responses.length;
        return {q, responses, counts, total, correctArr, isSurvey: correctArr.length===0};
      }).filter(Boolean);
    }
    const histDetailTab=ref('leaderboard'); // leaderboard | questions

    function historyLeaderboard(s){
      const scores={};
      (s.responses||[]).forEach(r=>{
        if(!scores[r.studentId])scores[r.studentId]={name:r.studentName,pts:0};
        if(r.points&&r.points>0)scores[r.studentId].pts+=r.points;
      });
      return Object.values(scores).sort((a,b)=>b.pts-a.pts);
    }
    async function deleteSelected(){
      if(!selectedSessions.value.length)return;
      if(!confirm(`確定要刪除已選的 ${selectedSessions.value.length} 筆紀錄？\n此操作無法復原。`))return;
      const ids=[...selectedSessions.value];
      sessions.value=sessions.value.filter(s=>!ids.includes(s.id));
      db.set('sessions',sessions.value);
      selectedSessions.value=[];
      if(_fbReady){
        try{
          await Promise.all(ids.map(id=>FB.remove('history/'+id)));
        }catch(e){
          alert('⚠️ 本機已刪除，但 Firebase 刪除失敗：'+e.message);
        }
      } else {
        alert('⚠️ 本機已刪除，但目前未連線 Firebase，雲端紀錄未刪除。\n請到系統設定連線 Firebase 後再試一次。');
      }
    }
    async function clearHistory(){
      if(!confirm('確定要清除所有歷史紀錄？\n此操作無法復原，Firebase 上的資料也會一併刪除。'))return;
      sessions.value=[];
      selectedSessions.value=[];
      db.set('sessions',[]);
      if(_fbReady){
        try{
          await FB.remove('history');
          alert('✅ 已清除本機與 Firebase 的所有歷史紀錄');
        }catch(e){
          alert('⚠️ 本機已清除，但 Firebase 刪除失敗：'+e.message);
        }
      } else {
        alert('⚠️ 本機已清除，但目前未連線 Firebase，雲端紀錄未刪除。\n請到系統設定連線 Firebase 後再試一次。');
      }
    }

    onUnmounted(()=>{stopTimer();unsubscribeSession();});

    return{
      page,questions,sessions,fbConfigStr,fbStatus,fbError,showFbModal,
      showDeleteConfirm,pendingDeleteId,showQModal,editQ,qForm,qFormError,
      showSModal,sForm,liveSession,liveResponses,participants,participantList,
      timer,timerMax,timerPct,progressPct,
      liveQ,liveResponsesToQ,optionCounts,totalAnswered,leaderboard,
      qrUrl,qrIsValid,baseUrl,showBaseUrlEdit,
      showDetails,selectedSessions,
      COLORS,SHAPES,LABELS,COLOR_HEX,fmt,
      connectFirebase,copyConfigSnippet,copyDone,fbConfigSnippet,
      openNewQ,openEditQ,deleteQ,confirmDelete,cancelDelete,
      setType,addOption,removeOption,toggleCorrect,saveQ,
      openNewSession,toggleSelectQ,startSession,
      nextQuestion,revealAnswer,endSession,
      openHistory,toggleHistorySelect,deleteSelected,historyLeaderboard,historyQuestions,histDetailTab,clearHistory,loadHistoryFromFirebase,
    };
  },

  template:`
<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎯</div>
      <span class="logo-text">QuizLive</span>

    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-badge" style="margin-bottom:6px;display:flex">
        <span :style="{color:fbStatus==='connected'?'#4ade80':fbStatus==='connecting'?'#fbbf24':'#f87171'}">●</span>
        &nbsp;{{fbStatus==='connected'?'Firebase 已連線':fbStatus==='connecting'?'連線中...':'未連線'}}
      </div>
      <div class="sidebar-badge">📚 共 {{questions.length}} 題</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- ══ QUESTIONS ══ -->
    <template v-if="page==='questions'">
      <div class="page-header">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div><div class="page-title">📝 題庫管理</div><div class="page-sub">新增、編輯、刪除題目</div></div>
          <button class="btn btn-primary btn-lg" @click="openNewQ">＋ 新增題目</button>
        </div>
      </div>
      <div class="page-content">
        <div v-if="questions.length===0" class="empty"><div class="empty-icon">📭</div><div>尚無題目，點擊右上角「新增題目」</div></div>
        <div v-for="(q,i) in questions" :key="q.id" class="q-card animate-in">
          <div class="q-card-header">
            <div class="q-num">{{i+1}}</div>
            <div class="q-text">
              {{q.text}}
              <span class="q-type-badge" :class="(q.correct||[]).length===0?'qtb-survey':q.type==='single'?'qtb-single':'qtb-multi'">
                {{(q.correct||[]).length===0?'📊 意見調查':(q.type==='single'?'單選':'多選')+' '+q.options.length+'選'+(q.correct||[]).length}}
              </span>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0">
              <button class="btn btn-ghost btn-icon" @click="openEditQ(q)">✏️</button>
              <button class="btn btn-ghost btn-icon" @click="deleteQ(q.id)">🗑️</button>
            </div>
          </div>
          <div class="q-options">
            <div v-for="(opt,j) in q.options" :key="j" class="q-option" :class="(q.correct||[]).includes(j)?'correct':'wrong'">
              <span class="opt-letter" :style="{background:COLOR_HEX[j],color:'#fff'}">{{LABELS[j]}}</span>
              {{opt}}<span v-if="(q.correct||[]).includes(j)" style="margin-left:auto;color:#4ade80">✓</span>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ══ SESSION ══ -->
    <template v-else-if="page==='session'">
      <!-- Not started -->
      <template v-if="!liveSession">
        <div class="page-header">
          <div class="page-title">🚀 開始課堂</div>
          <div class="page-sub">建立新課堂，學生掃描 QR Code 即可加入</div>
        </div>
        <div class="page-content">
          <!-- Firebase not connected warning -->
          <div v-if="fbStatus!=='connected'" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:16px;margin-bottom:20px;max-width:540px;margin-left:auto;margin-right:auto">
            <div style="font-weight:800;color:#f87171;margin-bottom:6px">⚠️ 尚未連線 Firebase</div>
            <div style="font-size:13px;color:var(--text-m);margin-bottom:10px">必須先連線 Firebase 才能讓學生跨裝置即時作答</div>
            <button class="btn btn-danger" @click="page='settings'">前往系統設定 →</button>
          </div>
          <div v-if="questions.length===0" class="empty"><div class="empty-icon">⚠️</div><div>請先在「題庫管理」新增題目</div></div>
          <div v-else style="max-width:540px;margin:0 auto">
            <div class="card" style="margin-bottom:16px">
              <div class="card-header"><div class="card-title">課堂設定</div></div>
              <div class="form-group">
                <label class="form-label">課堂名稱</label>
                <input class="form-control" v-model="sForm.name" placeholder="例：第三章複習測驗" />
              </div>
              <div class="form-group">
                <label class="form-label">每題作答時間（秒）</label>
                <input class="form-control" type="number" min="5" max="120" v-model="sForm.timeLimit" />
              </div>
            </div>
            <div class="card">
              <div class="card-header">
                <div class="card-title">選擇題目（{{sForm.selectedQIds.length}}/{{questions.length}}）</div>
                <button class="btn btn-ghost" style="font-size:12px" @click="sForm.selectedQIds=sForm.selectedQIds.length===questions.length?[]:questions.map(q=>q.id)">全選/取消</button>
              </div>
              <div class="session-q-list">
                <div v-for="(q,i) in questions" :key="q.id" class="check-q-item" @click="toggleSelectQ(q.id)">
                  <input type="checkbox" :checked="(sForm.selectedQIds||[]).includes(q.id)" @click.stop="toggleSelectQ(q.id)" />
                  <span style="width:22px;color:var(--text-m);font-size:13px">{{i+1}}.</span>
                  <span style="flex:1;font-size:14px;font-weight:600">{{q.text}}</span>
                  <span class="tag" :class="(q.correct||[]).length===0?'tag-survey':q.type==='single'?'tag-single':'tag-multi'">
                    {{(q.correct||[]).length===0?'📊 調查':q.type==='single'?'單選':'多選'}}
                  </span>
                </div>
              </div>
              <div style="margin-top:16px">
                <button class="btn btn-success btn-lg" style="width:100%" @click="startSession" :disabled="fbStatus!=='connected'">
                  🚀 開始課堂（{{sForm.selectedQIds.length}} 題）
                </button>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- Live -->
      <template v-else>
        <div class="live-bar">
          <div>
            <div class="live-badge"><span class="live-dot"></span> LIVE</div>
            <div style="margin-top:4px;font-weight:800;font-size:15px">{{liveSession.name}}</div>
          </div>
          <div style="text-align:center">
            <div style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;margin-bottom:2px">課堂代碼</div>
            <div class="session-code">{{liveSession.id}}</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <div style="text-align:right">
              <div style="font-size:11px;color:rgba(255,255,255,.7);font-weight:700">已加入學生</div>
              <div style="font-family:'Fredoka One',cursive;font-size:24px">{{participantList.length}}</div>
            </div>
            <button class="btn btn-danger" @click="endSession">結束課堂</button>
          </div>
        </div>
        <div class="progress-bar-wrap" style="margin:0;border-radius:0">
          <div class="progress-bar-fill" :style="{width:progressPct+'%'}"></div>
        </div>
        <div style="display:flex;flex:1;min-height:0">
          <!-- Left panel -->
          <div style="width:300px;flex-shrink:0;border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto">
            <!-- QR -->
            <div class="card">
              <div class="card-title" style="margin-bottom:12px;text-align:center">📱 學生掃碼加入</div>
              <div v-if="!qrIsValid" style="background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:#fbbf24;font-weight:700">⚠️ 需設定部署網址</div>
              <div style="margin-bottom:10px">
                <div v-if="!showBaseUrlEdit" style="display:flex;align-items:center;gap:6px">
                  <div style="flex:1;font-size:11px;color:var(--text-m);background:var(--bg3);border-radius:6px;padding:5px 8px;word-break:break-all">{{baseUrl||'（未設定）'}}</div>
                  <button class="btn btn-ghost" style="font-size:11px;padding:4px 8px;flex-shrink:0" @click="showBaseUrlEdit=true">✏️</button>
                </div>
                <div v-else>
                  <input class="form-control" v-model="baseUrl" placeholder="https://chihtengchen.github.io/quizlive/quizlive.html" style="font-size:12px;margin-bottom:6px" />
                  <button class="btn btn-primary" style="font-size:12px;padding:5px 12px;width:100%" @click="showBaseUrlEdit=false">✅ 確認</button>
                </div>
              </div>
              <div style="text-align:center">
                <div class="qr-wrapper">
                  <img v-if="qrIsValid" :src="'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data='+encodeURIComponent(qrUrl)" width="180" height="180" />
                  <div v-else style="width:180px;height:180px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:4px;font-size:13px;color:#999;text-align:center;padding:12px">設定網址後<br>QR Code 顯示於此</div>
                </div>
                <div v-if="qrIsValid" style="margin-top:6px;font-size:11px;color:var(--primary-l);word-break:break-all">{{qrUrl}}</div>
              </div>
            </div>
            <!-- Stats -->
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              <div class="stat-box"><div class="stat-val">{{liveSession.currentIndex>=0?liveSession.currentIndex+1:'-'}}</div><div class="stat-label">當前題</div></div>
              <div class="stat-box"><div class="stat-val">{{(liveSession.questionIds||[]).length}}</div><div class="stat-label">總題數</div></div>
              <div class="stat-box"><div class="stat-val">{{totalAnswered}}</div><div class="stat-label">已作答</div></div>
              <div class="stat-box"><div class="stat-val">{{participantList.length}}</div><div class="stat-label">人數</div></div>
            </div>
            <!-- Leaderboard -->
            <div class="card" style="flex:1">
              <div class="card-title" style="margin-bottom:12px">🏆 排行榜</div>
              <div v-if="leaderboard.length===0" style="color:var(--text-m);font-size:13px;text-align:center;padding:12px">等待學生加入...</div>
              <div v-for="(p,i) in leaderboard" :key="p.name" class="lb-item" :class="'rank-'+(i+1)">
                <div class="lb-rank">{{i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}}</div>
                <div class="lb-name">{{p.name}}</div>
                <div class="lb-points">{{p.pts.toLocaleString()}}</div>
              </div>
            </div>
          </div>

          <!-- Center -->
          <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
            <div style="flex:1;overflow-y:auto;padding:24px">
              <!-- Waiting -->
              <div v-if="liveSession.status==='waiting'" style="text-align:center;padding:60px 20px">
                <div style="font-size:64px;margin-bottom:16px">⏳</div>
                <div style="font-family:'Fredoka One',cursive;font-size:32px;margin-bottom:8px">等待學生加入...</div>
                <div style="color:var(--text-m);margin-bottom:28px">請學生掃描左側 QR Code 加入課堂</div>
                <button class="btn btn-primary btn-lg" @click="nextQuestion">▶ 開始第一題</button>
              </div>
              <!-- Question / Reveal -->
              <template v-if="liveSession.status==='question'||liveSession.status==='reveal'">
                <div v-if="liveQ" class="q-stage animate-in">
                  <div class="q-stage-num">
                    題目 {{liveSession.currentIndex+1}} / {{(liveSession.questionIds||[]).length}}
                    <span class="q-type-badge" :class="(liveQ.correct||[]).length===0?'qtb-survey':liveQ.type==='single'?'qtb-single':'qtb-multi'">
                      {{(liveQ.correct||[]).length===0?'📊 意見調查':liveQ.type==='single'?'單選':'多選'}}
                    </span>
                  </div>
                  <!-- Timer -->
                  <div v-if="liveSession.status==='question'" style="position:absolute;top:16px;right:16px">
                    <div style="position:relative;display:inline-flex;align-items:center;justify-content:center">
                      <svg width="80" height="80">
                        <circle cx="40" cy="40" r="34" fill="none" stroke="var(--bg3)" stroke-width="5"/>
                        <circle cx="40" cy="40" r="34" fill="none"
                          :stroke="timerPct<25?'#ef4444':timerPct<50?'#f59e0b':'#6366f1'"
                          stroke-width="5" stroke-linecap="round"
                          :stroke-dasharray="213.6"
                          :stroke-dashoffset="213.6-(timerPct/100)*213.6"
                          transform="rotate(-90 40 40)"
                          style="transition:stroke-dashoffset .9s linear"/>
                      </svg>
                      <div style="position:absolute;font-family:'Fredoka One',cursive;font-size:22px" :style="{color:timerPct<25?'#f87171':'var(--text)'}">{{timer}}</div>
                    </div>
                  </div>
                  <div class="q-stage-text">{{liveQ.text}}</div>
                  <div class="answer-grid" :class="'cols-'+Math.min((liveQ.options||[]).length,(liveQ.options||[]).length<=2?2:(liveQ.options||[]).length<=3?3:4)" style="max-width:700px;margin:0 auto">
                    <div v-for="(opt,j) in liveQ.options" :key="j"
                      class="answer-btn" :class="[COLORS[j],
                        liveSession.status==='reveal'?'revealed':'',
                        liveSession.status==='reveal'&&(liveQ.correct||[]).length>0&&(liveQ.correct||[]).includes(j)?'correct':'',
                        liveSession.status==='reveal'&&(liveQ.correct||[]).length>0&&!(liveQ.correct||[]).includes(j)?'wrong':'']">
                      <div class="opt-shape">{{SHAPES[j]}}</div>
                      <span style="flex:1">{{opt}}</span>
                      <span v-if="liveSession.status==='reveal'&&(liveQ.correct||[]).length>0&&(liveQ.correct||[]).includes(j)" style="font-size:18px">✓</span>
                    </div>
                  </div>
                </div>
                <!-- Response bars -->
                <div v-if="liveQ" class="card animate-in" style="margin-top:16px">
                  <div class="card-header">
                    <div class="card-title">📊 即時回答統計（{{totalAnswered}} 人）</div>
                    <div style="font-size:13px;color:var(--text-m)">共 {{participantList.length}} 人</div>
                  </div>
                  <div v-for="(cnt,j) in optionCounts" :key="j" class="resp-bar-row">
                    <div style="width:28px;flex-shrink:0">
                      <span :style="{background:COLOR_HEX[j],color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:'4px',width:'24px',height:'24px',fontSize:'12px',fontWeight:800}">{{LABELS[j]}}</span>
                    </div>
                    <div class="resp-bar-track">
                      <div class="resp-bar-fill" :style="{width:totalAnswered>0?(cnt/totalAnswered*100)+'%':'0%',background:COLOR_HEX[j]}">{{cnt>0?cnt:''}}</div>
                    </div>
                    <div style="width:40px;text-align:right;font-size:13px;font-weight:700;color:var(--text-m)">{{totalAnswered>0?Math.round(cnt/totalAnswered*100):0}}%</div>
                  </div>
                </div>
              </template>
              <!-- Finished -->
              <div v-if="liveSession.status==='finished'" style="text-align:center;padding:40px 20px" class="animate-pop">
                <div style="font-size:64px;margin-bottom:16px">🎉</div>
                <div style="font-family:'Fredoka One',cursive;font-size:36px;margin-bottom:12px;background:linear-gradient(135deg,#6366f1,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">課堂結束！</div>
                <button class="btn btn-primary btn-lg" @click="page='history';if(fbStatus==='connected')loadHistoryFromFirebase()">查看歷史紀錄</button>
              </div>
            </div>
            <!-- Controls -->
            <div class="ctrl-panel">
              <div style="font-size:13px;color:var(--text-m)">
                <template v-if="liveSession.status==='waiting'">尚未開始</template>
                <template v-else-if="liveSession.status==='question'">⏱ 倒數：{{timer}} 秒</template>
                <template v-else-if="liveSession.status==='reveal'">✅ 答案揭曉</template>
                <template v-else-if="liveSession.status==='finished'">已結束</template>
              </div>
              <div style="display:flex;gap:8px">
                <button v-if="liveSession.status==='question'" class="btn btn-ghost" @click="revealAnswer">⏩ 提前揭曉</button>
                <button v-if="liveSession.status==='reveal'&&liveSession.currentIndex+1<liveSession.questionIds.length" class="btn btn-primary btn-lg" @click="nextQuestion">下一題 ▶</button>
                <button v-if="liveSession.status==='reveal'&&liveSession.currentIndex+1>=liveSession.questionIds.length" class="btn btn-success btn-lg" @click="endSession">🏁 結束課堂</button>
              </div>
            </div>
          </div>
        </div>
      </template>
    </template>

    <!-- ══ HISTORY ══ -->
    <template v-else-if="page==='history'">
      <div class="page-header">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div><div class="page-title">📊 歷史紀錄</div><div class="page-sub">過去課堂完整結果</div></div>
          <div style="display:flex;gap:8px">
            <button v-if="selectedSessions.length>0" class="btn btn-danger" @click="deleteSelected">🗑 刪除已選 ({{selectedSessions.length}})</button>
            <button v-if="sessions.length>0" class="btn btn-ghost" @click="clearHistory">🗑 清除全部</button>
          </div>
        </div>
      </div>
      <div class="page-content">
        <div v-if="sessions.length===0" class="empty"><div class="empty-icon">📭</div><div>尚無歷史紀錄</div></div>
        <div v-for="s in sessions" :key="s.id" class="history-card animate-in" :class="{selected:selectedSessions.includes(s.id)}" @click="openHistory(s)">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <input type="checkbox" class="opt-checkbox" :checked="selectedSessions.includes(s.id)" @click.stop="toggleHistorySelect(s.id)" style="margin-top:3px;flex-shrink:0">
            <div style="flex:1">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                <div><div style="font-weight:800;font-size:15px">{{s.name}}</div><div style="font-size:12px;color:var(--text-m)">代碼：{{s.id}} · {{fmt(s.startedAt)}}</div></div>
                <span class="tag tag-single">✅ 完成</span>
              </div>
              <div style="display:flex;gap:16px;font-size:13px;color:var(--text-m)">
                <span>題數：<strong style="color:var(--text)">{{s.questionIds.length}}</strong></span>
                <span>參與：<strong style="color:var(--text)">{{(s.participants||[]).length}}</strong></span>
                <span>作答：<strong style="color:var(--text)">{{(s.responses||[]).length}}</strong></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>

    <!-- ══ SETTINGS ══ -->
    <template v-else-if="page==='settings'">
      <div class="page-header">
        <div class="page-title">⚙️ 系統設定</div>
        <div class="page-sub">連線 Firebase 以支援跨裝置即時作答</div>
      </div>
      <div class="page-content">
        <div style="max-width:600px;margin:0 auto">
          <!-- Firebase status -->
          <div class="card" style="margin-bottom:16px">
            <div class="card-title" style="margin-bottom:4px">🔥 Firebase 連線狀態</div>
            <div style="margin-bottom:12px">
              <span :style="{color:fbStatus==='connected'?'#4ade80':fbStatus==='connecting'?'#fbbf24':'#f87171',fontWeight:800}">
                {{fbStatus==='connected'?'✅ 已連線':fbStatus==='connecting'?'⏳ 連線中...':'❌ 未連線'}}
              </span>
            </div>
            <div v-if="fbStatus!=='connected'" style="background:rgba(99,102,241,.08);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px">
              <div style="font-weight:800;margin-bottom:10px;font-size:14px">📋 如何取得 Firebase 設定？</div>
              <div class="setup-step">1. 前往 <a href="https://console.firebase.google.com" target="_blank" style="color:var(--primary-l)">console.firebase.google.com</a> → 建立專案（免費）</div>
              <div class="setup-step">2. 左側選單 → <code>Realtime Database</code> → 建立資料庫 → 選「測試模式」</div>
              <div class="setup-step">3. 左側 ⚙️ 專案設定 → 「您的應用程式」→ 新增網路應用程式 → 複製 <code>firebaseConfig</code> 物件</div>
              <div class="setup-step">4. 將整個 <code>{ apiKey: "...", ... }</code> 貼入下方輸入框</div>
            </div>
            <div class="form-group">
              <label class="form-label">Firebase 設定（JSON）</label>
              <textarea class="form-control" v-model="fbConfigStr" rows="9"
                placeholder='直接貼入 Firebase 主控台的 firebaseConfig 物件，例如：&#10;{&#10;  apiKey: &quot;AIzaSy...&quot;,&#10;  authDomain: &quot;my-project.firebaseapp.com&quot;,&#10;  databaseURL: &quot;https://my-project-default-rtdb.firebaseio.com&quot;,&#10;  projectId: &quot;my-project&quot;,&#10;  ...&#10;}'></textarea>
              <div style="margin-top:6px;font-size:11px;color:var(--text-d)">💡 支援直接貼入 JS 格式，不需要手動加引號</div>
            </div>
            <div v-if="fbError" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;font-weight:700;margin-bottom:12px">❌ {{fbError}}</div>
            <button class="btn btn-primary btn-lg" style="width:100%" @click="connectFirebase" :disabled="fbStatus==='connecting'">
              {{fbStatus==='connecting'?'⏳ 連線中...':'🔌 連線 Firebase'}}
            </button>

            <!-- Step 2: Copy config to HTML -->
            <div v-if="fbStatus==='connected'" style="margin-top:20px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:12px;padding:18px">
              <div style="font-weight:800;color:#4ade80;margin-bottom:8px;font-size:15px">✅ 連線成功！接下來請完成以下步驟：</div>
              <div style="font-size:13px;color:var(--text-m);line-height:1.8;margin-bottom:14px">

const StudentApp={
  props:['sessionCode'],
  setup(props){
    const studentName=ref(db.get('studentName',''));
    const studentId=ref(db.get('studentId')||uid());
    const phase=ref('loading'); // loading|join|waiting|question|answered|finished
    const session=ref(null);
    const timer=ref(0);
    const timerMax=ref(20);
    const selected=ref([]);
    const myAnswer=ref(null);
    const totalPoints=ref(0);
    const liveQ=ref(null);
    const joinError=ref('');
    let questions=db.get('questions',[]);  // fallback, will be overridden from Firebase

    db.set('studentId',studentId.value);
    watch(studentName,v=>db.set('studentName',v));

    let _unsubs=[];
    let lastQIndex=-1;
    let lastStatus='';

    async function setupFirebase(){
      const cfg=FIREBASE_CONFIG_BAKED||db.get('fbConfig');
      if(!cfg||!cfg.databaseURL){phase.value='nofirebase';return;}
      if(!_fbReady){
        const r=await initFirebase(cfg);
        if(!r.ok){
          console.error('Firebase init failed:',r.msg);
          phase.value='nofirebase';
          return;
        }
      }
      phase.value='join';
    }

    onMounted(setupFirebase);

    async function join(){
      if(!studentName.value.trim()){joinError.value='請輸入姓名！';return;}
      joinError.value='';
      const s=await FB.once('sessions/'+props.sessionCode);
      if(!s){joinError.value='找不到課堂代碼「'+props.sessionCode+'」，請確認是否正確。';return;}
      if(s.status==='finished'){joinError.value='此課堂已結束。';return;}
      session.value=s;
      timerMax.value=s.timeLimit||20;
      // Load question data from Firebase
      const fbQs = await FB.once('questions/'+s.id);
      if(fbQs) questions = Object.values(fbQs);
      await FB.set('participants/'+s.id+'/'+studentId.value, studentName.value);
      subscribeSession(s.id);
      phase.value='waiting';
    }

    function subscribeSession(sid){
      _unsubs.push(FB.on('sessions/'+sid,'value',val=>{
        if(!val)return;
        session.value=val;
        if(val.timer!==undefined)timer.value=val.timer;
        timerMax.value=val.timeLimit||20;

        if(val.status==='finished'){phase.value='finished';return;}

        if(val.status==='question'&&val.currentIndex!==lastQIndex){
          lastQIndex=val.currentIndex;
          lastStatus='question';
          selected.value=[];myAnswer.value=null;
          const qid=val.questionIds[val.currentIndex];
          liveQ.value=questions.find(q=>q.id===qid)||null;
          if(liveQ.value)phase.value='question';
          else phase.value='waiting';
        }

        if(val.status==='reveal'&&lastStatus!=='reveal'){
          lastStatus='reveal';
          autoSubmitOnReveal();
        }

        if(val.status==='waiting'){phase.value='waiting';lastQIndex=-1;lastStatus='waiting';}
      }));
    }

    function unsubscribeSession(){_unsubs.forEach(u=>u());_unsubs=[];}

    const submitError=ref('');
    const debugInfo=ref('');
    const fbWriteStatus=ref('等待送出...');

    function toggleSelect(i){
      const q=liveQ.value;
      if(!q||myAnswer.value)return;
      if(q.type==='single'){
        selected.value=[i];
      } else {
        const arr=[...selected.value];
        const idx=arr.indexOf(i);
        if(idx===-1)arr.push(i);else arr.splice(idx,1);
        selected.value=arr;
      }
    }

    function doSubmit(){
      // ── Guard checks ──
      const q=liveQ.value;
      const s=session.value;
      const sel=selected.value.slice();
      submitError.value='';

      if(!q){submitError.value='錯誤：題目資料遺失，請重新整理';return;}
      if(!s){submitError.value='錯誤：課堂資料遺失，請重新掃碼';return;}
      if(myAnswer.value)return;
      if(sel.length===0){submitError.value='請先選擇答案';return;}

      // ── Compute result（變數宣告在 try 外面）──
      const correctArr=Array.isArray(q.correct)?q.correct:Object.values(q.correct||{});
      const isSurvey=correctArr.length===0;
      let correct=false;
      if(!isSurvey){
        const cs=new Set(correctArr);
        if(q.type==='single')correct=sel.length===1&&cs.has(sel[0]);
        else correct=correctArr.every(i=>new Set(sel).has(i))&&sel.every(i=>cs.has(i));
      }
      const totalQs=s.questionIds?s.questionIds.length:1;
      const currentIdx=s.currentIndex||0;
      const isLastQ=currentIdx===totalQs-1;
      const basePerQ=Math.floor(100/totalQs);
      const perQ=isLastQ?(100-basePerQ*(totalQs-1)):basePerQ;
      const pts=correct||isSurvey?perQ:0;

      // ── Update UI immediately ──
      myAnswer.value={sel,correct,points:pts,auto:false,isSurvey};
      totalPoints.value+=pts;
      phase.value='answered';
      fbWriteStatus.value='⏳ 傳送中...';

      // ── Write to Firebase（background）──
      if(!_fbDb||!_fbReady){
        fbWriteStatus.value='❌ Firebase 未初始化';
        return;
      }
      const response={
        sessionId:s.id,questionId:q.id,
        studentId:studentId.value,studentName:studentName.value,
        selected:sel,correct:isSurvey?null:correct,
        points:pts,isSurvey,timestamp:now(),
      };
      const writePath='responses/'+s.id+'/'+q.id+'/'+studentId.value;
      (async()=>{
        for(let attempt=1;attempt<=3;attempt++){
          try{
            await _fbDb.ref(writePath).set(response);
            fbWriteStatus.value='✅ 已送出！';
            return;
          }catch(e){
            fbWriteStatus.value='❌ 第'+attempt+'次失敗：'+e.message;
            if(attempt<3)await new Promise(r=>setTimeout(r,800*attempt));
          }
        }
        fbWriteStatus.value='❌ 傳送失敗（請截圖此訊息）';
      })();
    }

    // Auto-submit when teacher reveals (no selection made)
    function autoSubmitOnReveal(){
      if(myAnswer.value||!liveQ.value)return;
      const q=liveQ.value;const s=session.value;if(!q||!s)return;
      const correctArr=Array.isArray(q.correct)?q.correct:(q.correct?Object.values(q.correct):[]);
      const isSurvey=correctArr.length===0;
      myAnswer.value={sel:[],correct:false,points:0,auto:true,isSurvey};
      const response={
        sessionId:s.id,questionId:q.id,
        studentId:studentId.value,studentName:studentName.value,
        selected:[],correct:isSurvey?null:false,
        points:0,isSurvey,timestamp:now(),
      };
      FB.set('responses/'+s.id+'/'+q.id+'/'+studentId.value, response).catch(()=>{});
    }

    const timerPct=computed(()=>timerMax.value>0?Math.max(0,timer.value/timerMax.value*100):0);
    onUnmounted(()=>unsubscribeSession());

    return{studentName,phase,session,timer,timerMax,timerPct,selected,myAnswer,totalPoints,liveQ,joinError,
      COLORS,SHAPES,LABELS,COLOR_HEX,join,toggleSelect,doSubmit,submitError,debugInfo,fbWriteStatus};
  },
  template:`

      <span style="font-family:'Fredoka One',cursive;font-size:18px;background:linear-gradient(135deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent">QuizLive</span>

    <div v-if="phase!=='join'&&phase!=='loading'&&phase!=='nofirebase'" style="display:flex;align-items:center;gap:12px">

        <div class="answered-icon">{{myAnswer?.correct?'🎉':'😔'}}</div>
        <div :class="myAnswer?.correct?'result-correct':'result-wrong'">{{myAnswer?.correct?'答對了！':'答錯了...'}}</div>
        <div v-if="myAnswer?.correct" style="font-family:'Fredoka One',cursive;font-size:28px;color:var(--primary-l);margin:8px 0">＋{{myAnswer.points}} 分</div>
      </template>
      <div class="result-sub" style="margin-top:12px">等待老師進行下一題...</div>
      <!-- Firebase write status -->
      <div v-if="fbWriteStatus&&fbWriteStatus!=='等待送出...'" style="margin-top:8px;font-size:11px;color:var(--text-d);font-family:monospace">{{fbWriteStatus}}</div>
      <div v-if="totalPoints>0" style="margin-top:16px;color:var(--text-m);font-size:14px">你的總分：<strong style="color:var(--primary-l);font-size:20px;font-family:'Fredoka One',cursive">{{totalPoints.toLocaleString()}}</strong> 分</div>
    </div>
    <!-- Finished -->
    <div v-else-if="phase==='finished'" class="answered-screen animate-pop">
      <div style="font-size:72px;margin-bottom:16px">🏆</div>
      <div style="font-family:'Fredoka One',cursive;font-size:36px;background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px">課堂結束！</div>
      <div style="color:var(--text-m);margin-bottom:16px">感謝你的參與 🎊</div>
      <div style="font-family:'Fredoka One',cursive;font-size:28px;color:var(--primary-l)">最終得分：{{totalPoints.toLocaleString()}} 分</div>
    </div>
  </div>
</div>
`};

/* ── ROOT ── */
const App={
  components:{TeacherApp,StudentApp},
  setup(){
    let search=window.location.search;
    if(!search&&window.location.hash&&window.location.hash.includes('mode='))
      search='?'+window.location.hash.replace(/^#/,'');
    const p=new URLSearchParams(search);
    const mode=p.get('mode'),sessionCode=p.get('session');
    const isStudent=mode==='student'&&!!sessionCode;
    return{isStudent,sessionCode};
  },
  template:`<StudentApp v-if="isStudent" :sessionCode="sessionCode"/><TeacherApp v-else/>`
};

const _app=createApp(App);
_app.config.errorHandler=(err,vm,info)=>{
  document.getElementById('app').innerHTML='<div style="background:#0a0e1a;color:#f87171;font-family:monospace;padding:30px;min-height:100vh"><h2 style="color:#fb923c;margin-bottom:12px">❌ Vue 錯誤</h2><pre style="white-space:pre-wrap;font-size:13px;color:#fca5a5">'+String(err)+'</pre><pre style="font-size:11px;color:#64748b;margin-top:8px">info:'+String(info)+'\n'+String(err.stack||'')+'</pre></div>';
};
try{_app.mount('#app');}
catch(e){document.getElementById('app').innerHTML='<div style="background:#0a0e1a;color:#f87171;font-family:monospace;padding:30px;min-height:100vh"><h2 style="color:#fb923c">❌ Mount 錯誤</h2><pre style="white-space:pre-wrap;font-size:13px;color:#fca5a5">'+String(e)+'\n'+String(e.stack||'')+'</pre></div>';}
} // end initApp
initApp();
</script>
</body>
</html>
